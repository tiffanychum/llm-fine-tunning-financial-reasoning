# SFT Training Configuration — v1
# Change version (v1 → v2) whenever you run a new experiment

experiment:
  name: "sft-qwen25-7b-v1"
  tags: ["sft", "qwen25-7b", "financial-reasoning"]

model:
  name: "unsloth/Qwen2.5-7B-Instruct"
  max_seq_length: 4096
  load_in_4bit: false                      # A100 40GB — full bfloat16, no quantization needed

lora:
  r: 32                                    # A100: bumped from 16 → 32 for more capacity
  lora_alpha: 32                           # keep alpha == r (scaling = 1x)
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "data/processed/sft_train_v1.jsonl"
  val_path:   "data/processed/sft_val_v1.jsonl"

training:
  epochs: 3
  learning_rate: 5.0e-6
  per_device_batch_size: 2               # OOM fix: halved from 4 → 2
  gradient_accumulation_steps: 16        # doubled to keep effective batch = 32
  warmup_ratio: 0.05
  scheduler: "cosine"
  fp16: false
  bf16: true                             # A100 native bfloat16
  max_grad_norm: 1.0
  save_steps: 100
  save_total_limit: 3
  logging_steps: 10
  packing: true

output:
  checkpoint_dir: "checkpoints/sft/"
  results_dir:    "results/sft/"

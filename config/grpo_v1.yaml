# GRPO Training Configuration — v1
# Always start from the SFT checkpoint, never from base model

experiment:
  name: "grpo-qwen7b-v1"
  tags: ["grpo", "qwen7b", "financial-reasoning"]

model:
  sft_checkpoint: "checkpoints/sft/best/"
  max_seq_length: 4096
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 16
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  rl_path: "data/processed/rl_solvable.jsonl"

training:
  epochs: 3
  learning_rate: 5.0e-7              # 10x lower than SFT — fine adjustments only
  per_device_batch_size: 1           # always 1 for GRPO
  num_generations: 8                 # G=8 attempts per question
  max_new_tokens: 512
  temperature: 0.7                   # need exploration (not too deterministic)
  kl_coef: 0.02                      # increase to 0.05 if entropy collapses
  save_steps: 50
  save_total_limit: 3
  logging_steps: 5

reward:
  format_weight: 0.2
  accuracy_weight: 0.8
  tolerance_exact: 0.01              # within 1% → reward 1.0
  tolerance_close: 0.05              # within 5% → reward 0.5
  tolerance_partial: 0.15            # within 15% → reward 0.2

# Alert thresholds (for W&B alerts)
alerts:
  entropy_min: 0.15                  # stop if entropy drops below this
  kl_max: 0.4                        # investigate if KL spikes above this
  format_rate_min: 0.7               # investigate if format rate drops below this

output:
  checkpoint_dir: "checkpoints/grpo/"
  results_dir:    "results/grpo/"
